<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinAdvisor Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="top-nav">
      <div class="brand">
        <span id="brand-icon" class="brand-icon">FA</span>
        <span id="brand-name">FinAdvisor</span>
        <span id="brand-tag" class="brand-tag">Prototype</span>
      </div>
      <nav class="nav-links">
        <a href="#/home">Home</a>
        <a href="#/stock/AAPL">Stock</a>
        <a href="#/article/1">Article</a>
        <a href="#/activity">Activity</a>
        <a href="#/watchlist">Watchlist</a>
        <a href="#/screener">Screener</a>
      </nav>
      <div class="nav-controls">
        <label class="blueprint-label" for="blueprint-select">Blueprint</label>
        <select id="blueprint-select" class="blueprint-select">
          <option value="b1">Seeking Alpha Style</option>
          <option value="b2">Motley Fool Style</option>
          <option value="b3">Zacks Style</option>
          <option value="b4">Quiver Quant Style</option>
          <option value="b5">TipRanks Style</option>
        </select>
        <div class="mock-toggle">USE_MOCK_DATA=true</div>
      </div>
    </header>

    <main id="app" class="app-root"></main>

    <footer class="site-footer">
      <div>Disclosures: Prototype only. No real market data.</div>
      <div>Not investment advice.</div>
    </footer>

    <script src="../config.js"></script>
    <script src="../data/mock-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
